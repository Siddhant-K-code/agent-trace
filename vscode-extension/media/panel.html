<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-NONCE_PLACEHOLDER';">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--vscode-font-family);
    font-size: var(--vscode-font-size);
    color: var(--vscode-foreground);
    background: var(--vscode-sideBar-background);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #header {
    padding: 8px 10px 6px;
    border-bottom: 1px solid var(--vscode-sideBarSectionHeader-border, #333);
    flex-shrink: 0;
  }
  #stats {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--vscode-descriptionForeground);
    margin-bottom: 6px;
  }
  #stats span { white-space: nowrap; }
  #stats .cost { color: var(--vscode-charts-green, #4ec9b0); font-weight: 600; }
  #stats .errors { color: var(--vscode-errorForeground, #f48771); }
  #active-tool {
    font-size: 11px;
    color: var(--vscode-descriptionForeground);
    min-height: 14px;
    font-style: italic;
  }
  #controls {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  button {
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid var(--vscode-button-border, transparent);
    border-radius: 2px;
    cursor: pointer;
    background: var(--vscode-button-secondaryBackground);
    color: var(--vscode-button-secondaryForeground);
  }
  button:hover { background: var(--vscode-button-secondaryHoverBackground); }
  button.primary {
    background: var(--vscode-button-background);
    color: var(--vscode-button-foreground);
  }
  button.primary:hover { background: var(--vscode-button-hoverBackground); }
  button:disabled { opacity: 0.4; cursor: default; }
  #events {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .event {
    display: grid;
    grid-template-columns: 18px 1fr auto;
    gap: 4px;
    padding: 3px 10px;
    font-size: 11px;
    line-height: 1.4;
    border-bottom: 1px solid var(--vscode-sideBar-background);
  }
  .event:hover { background: var(--vscode-list-hoverBackground); }
  .event.error { color: var(--vscode-errorForeground, #f48771); }
  .event .icon { text-align: center; flex-shrink: 0; }
  .event .summary {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--vscode-foreground);
  }
  .event.error .summary { color: var(--vscode-errorForeground, #f48771); }
  .event .time {
    color: var(--vscode-descriptionForeground);
    white-space: nowrap;
    font-size: 10px;
    align-self: center;
  }
  #empty {
    padding: 20px 10px;
    text-align: center;
    color: var(--vscode-descriptionForeground);
    font-size: 11px;
    line-height: 1.6;
  }
  #ended-banner {
    display: none;
    padding: 4px 10px;
    font-size: 11px;
    background: var(--vscode-diffEditor-removedLineBackground, #3a1a1a);
    color: var(--vscode-descriptionForeground);
    text-align: center;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="header">
  <div id="stats">
    <span class="cost" id="stat-cost">$0.0000</span>
    <span id="stat-calls">0 calls</span>
    <span class="errors" id="stat-errors" style="display:none">0 errors</span>
    <span id="stat-session" style="color:var(--vscode-descriptionForeground)"></span>
  </div>
  <div id="active-tool"></div>
  <div id="controls">
    <button class="primary" id="btn-pause" disabled>Pause</button>
    <button id="btn-resume" style="display:none">Resume</button>
    <button id="btn-clear">Clear</button>
  </div>
</div>

<div id="ended-banner">Session ended</div>

<div id="events">
  <div id="empty">No active session.<br>Start an agent with <code>agent-strace setup</code>.</div>
</div>

<script nonce="NONCE_PLACEHOLDER">
  const vscodeApi = acquireVsCodeApi();
  const eventsEl = document.getElementById('events');
  const emptyEl = document.getElementById('empty');
  const endedBanner = document.getElementById('ended-banner');
  const pauseBtn = document.getElementById('btn-pause');
  const resumeBtn = document.getElementById('btn-resume');
  const clearBtn = document.getElementById('btn-clear');
  let eventCount = 0;

  pauseBtn.addEventListener('click', function() { vscodeApi.postMessage({ command: 'pause' }); });
  resumeBtn.addEventListener('click', function() { vscodeApi.postMessage({ command: 'resume' }); });
  clearBtn.addEventListener('click', clearEvents);

  function clearEvents() {
    while (eventsEl.lastChild && eventsEl.lastChild !== emptyEl) {
      eventsEl.removeChild(eventsEl.lastChild);
    }
    eventCount = 0;
    emptyEl.style.display = 'block';
  }

  window.addEventListener('message', function(e) {
    const msg = e.data;

    if (msg.type === 'reset') {
      clearEvents();
      endedBanner.style.display = 'none';
      pauseBtn.disabled = false;
      return;
    }

    if (msg.type === 'sessionEnd') {
      endedBanner.style.display = 'block';
      pauseBtn.disabled = true;
      resumeBtn.style.display = 'none';
      pauseBtn.style.display = 'inline-block';
      return;
    }

    if (msg.type === 'state') {
      document.getElementById('stat-cost').textContent = '$' + msg.cost;
      document.getElementById('stat-calls').textContent = msg.toolCalls + ' calls';
      const errEl = document.getElementById('stat-errors');
      if (msg.errors > 0) {
        errEl.textContent = msg.errors + ' error' + (msg.errors > 1 ? 's' : '');
        errEl.style.display = 'inline';
      } else {
        errEl.style.display = 'none';
      }
      if (msg.sessionId) {
        document.getElementById('stat-session').textContent = msg.sessionId + '\u2026';
      }
      const toolEl = document.getElementById('active-tool');
      toolEl.textContent = msg.activeTool ? '\u27f3 ' + msg.activeTool : '';
      if (msg.paused) {
        pauseBtn.style.display = 'none';
        resumeBtn.style.display = 'inline-block';
      } else {
        pauseBtn.style.display = 'inline-block';
        resumeBtn.style.display = 'none';
      }
      return;
    }

    if (msg.type === 'event') {
      emptyEl.style.display = 'none';
      eventCount++;

      const row = document.createElement('div');
      row.className = 'event' + (msg.isError ? ' error' : '');

      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = msg.icon;

      const summary = document.createElement('span');
      summary.className = 'summary';
      summary.textContent = msg.summary || msg.eventType;
      summary.title = msg.summary || msg.eventType;

      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = msg.time;

      row.appendChild(icon);
      row.appendChild(summary);
      row.appendChild(time);
      eventsEl.appendChild(row);
      eventsEl.scrollTop = eventsEl.scrollHeight;
    }
  });
</script>
</body>
</html>
