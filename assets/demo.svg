  <!-- Divider -->
  <line x1="16" y1="502" x2="844" y2="502" stroke="#21262d" stroke-width="1"/>

  <!-- Footer -->
  <text x="16" y="522" fill="#8b949e" font-size="11">Tool calls show actual values: commands, file paths, glob patterns.</text>
  <text x="16" y="538" fill="#8b949e" font-size="11">Errors show what failed. Assistant responses are stripped of markdown.</text>

  <!-- install badge -->
  <rect x="16" y="554" width="260" height="24" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="26" y="570" fill="#58a6ff" font-size="12">$</text>
  <text x="38" y="570" fill="#e6edf3" font-size="12">uv tool install agent-strace</text>

  <rect x="288" y="554" width="260" height="24" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="298" y="570" fill="#58a6ff" font-size="12">$</text>
  <text x="310" y="570" fill="#e6edf3" font-size="12">agent-trace replay &lt;session-id&gt;</text>
