  <text x="76"  y="454" fill="#d2a8ff">→</text>
  <text x="90"  y="454" fill="#d2a8ff">tool_call</text>
  <text x="170" y="454" fill="#e6edf3">Bash</text>
  <text x="210" y="454" fill="#8b949e">$ uv run --with pytest pytest tests/ -v 2&gt;&amp;1</text>

  <!-- tool_result Bash final -->
  <text x="16"  y="470" fill="#8b949e">+1m43.67s</text>
  <text x="84"  y="470" fill="#3fb950">←</text>
  <text x="98"  y="470" fill="#3fb950">tool_result</text>
  <text x="186" y="470" fill="#e6edf3">Bash</text>
  <text x="226" y="470" fill="#8b949e">(5.88s)</text>
