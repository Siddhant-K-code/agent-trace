  <text x="16"  y="284" fill="#8b949e">+ 3.55s</text>
  <text x="76"  y="284" fill="#d2a8ff">→</text>
  <text x="90"  y="284" fill="#d2a8ff">tool_call</text>
  <text x="170" y="284" fill="#e6edf3">Glob</text>
