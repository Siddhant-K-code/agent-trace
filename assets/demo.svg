  <!-- assistant_response -->
  <text x="16"  y="488" fill="#8b949e">+1m52.54s</text>
  <text x="84"  y="488" fill="#ffa657">🤖</text>
  <text x="102" y="488" fill="#ffa657">assistant_response</text>
